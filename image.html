    <script>
    document.write('<button id="langBtn" onclick="toggleLang()" style="position:fixed;top:80px;right:20px;z-index:1001;padding:10px 20px;background:white;border:2px solid rgb(235, 65, 121);border-radius:20px;cursor:pointer;font-weight:bold;color:rgb(235, 65, 121)">العربية</button>');

    function toggleLang() {
        var lang = localStorage.getItem("lang") || "en";
        var newLang = lang === "en" ? "ar" : "en";
        localStorage.setItem("lang", newLang);
        document.body.dir = newLang === "ar" ? "rtl" : "ltr";
        document.getElementById("langBtn").textContent = newLang === "en" ? "العربية" : "English";
        renderProduct();
        updateContent();
    }
    
    function updateContent() {
        var lang = localStorage.getItem("lang") || "en";
        var navLinks = document.querySelectorAll("#navMenu li a");
        if (navLinks[0]) navLinks[0].textContent = lang === "ar" ? "الرئيسية" : "Home";
        if (navLinks[1]) navLinks[1].textContent = lang === "ar" ? "عن الشركة" : "About As";
        if (navLinks[2]) navLinks[2].textContent = lang === "ar" ? "المنتجات" : "Prodacts";
        if (navLinks[3]) navLinks[3].textContent = lang === "ar" ? "اتصل بنا" : "Contact";
        
        var footerText = document.getElementById("footerText");
        if (footerText) footerText.textContent = lang === "ar" ? "جميع الحقوق محفوظة" : "All Rights Reserved";
    }
    </script>

    <div class="details" id="prodactdetalis"></div>

    <div class="cartitem" id="cartItems"></div>
    <button onclick="window.location.href='check-out.html'" class="checkout-btn">check out</button>
    </div>
    
    <script>
    var prodacts = [

    {id: 1, nameEn: "Lip Balm", nameAr: "باليوم للشفاه", price: 80, image: "photo_2025-12-14_16-54-57.jpg", descEn: "With a strawberry scent - the secret to soft lips all day.", descAr:"ليب بالم Derma Care برائحة الفرولة … سرّ الشفايف الناعمة طول اليوم 💗 زبدة الشيا: تغذية عميقة ونعومة فورية💗 شمع العسل: يحبس الترطيب ويحمي من التشققات.💗زيت الجوجوبا 💗زيت الخروع 💗زيت بذور العنب 💗 فيتامين E: يحافظ على حيوية الشفايف ويمنع الجفاف."},
    {id: 2, nameEn: "Savings Package", nameAr: "الباقة الذهبية", price: 380, image: "photo_2025-12-14_16-51-26 (2).jpg", descEn: "Winter is here and your skin is calling for hydration! If you don't have a moisturizing routine to save you from winter dryness, you need to check out this package from Derma Care.", descAr: "الشتا دخل... وجلدك بينادي على الترطيب❄️لو لسه معندكيش روتين ترطيب ينقذك من جفاف الشتا يبقى لازم تشوفي الباكيدج دي من Derma Care  💗 باكيدج الترطيب الكامل = كل  اللي جسمك محتاجه💋 ليب بالم يحمي شفايفك من التشقق ويدي لون طبيعي مورد غني بزيوت الترطيب وفيتامين E وزبدة الشيا ترطب أكتر.🧴 بادي باتر أي كتكوتة بتحب ملمس النعومة والترطيب في جسمها طول الوقت، البادي باتر دي ليكي ، ترطيب عميق، دايم طول الوقت.🧴 بادي لوشن اللي بيعالج جلد الوزة ويساعد على تجديد البشرة وظهورها بمظهر صحي وناعم.•  بيرطب ويقشر خلايا الجلد الميته ،كريمي سهل الفرد* بيقلل نمو ظهور الشعر.جمال × ريحة × نعومة × ترطيب= روتين شتوي تحفة 🩷"},
    {id: 3, nameEn: "Body Lotion", nameAr: "لوشن الجسم", price: 280, image: "photo_2025-12-14_16-54-49.jpg", descEn: "125 ml - Derma Care Body Lotion is your ideal companion, combining strawberry and rose vanilla scent.", descAr: "بادي لوشن ديرما كير هو رفيقك المثالي يجمع ما بين رائحة الفرولة والروز فانيليا."},
    {id: 4, nameEn: "Pure Henna Powder", nameAr: "سدر مطحون نقي", price: 180, image: "photo_2025-12-14_16-48-51.jpg", descEn: "Pure natural henna powder for hair and skin care.", descAr: "سدر مطحون نقي للعناية بالشعر والبشرة."},
    {id: 5, nameEn: "Body Butter", nameAr: "زبدة الجسم", price: 120, image: "photo_2025-12-14_16-50-56.jpg", descEn: "50g - Body butter with strawberry and rose vanilla scent.", descAr: "50 جرام - زبدة الجسم برائحة الفراولة والوردة والفانيلياً."},
    {id: 6, nameEn: "Tint Creamy", nameAr: "تينت كريمي", price: 120, image: "photo_2025-12-14_16-49-41.jpg", descEn: "Creamy tint for a natural rosy look.", descAr: "تينتكريمي لمظهر وردي طبيعي."},
    {id: 7, nameEn: "Body Butter (Large)", nameAr: "زبدة الجسم الكبيرة", price: 200, image: "photo_2025-12-14_16-50-56.jpg", descEn: "100g - Body butter recommended to use after showering.", descAr: "100 جرام - زبدة الجسم يُنصح باستخدامها بعد الاستحمام."},
    {id: 8, nameEn: "Moroccan Soap with Argan Oil", nameAr: "الصابون المغربي بزيت الأرجان", price: 480, image: "WhatsApp Image 2026-03-03 at 11.33.47 PM.jpeg", descEn: "Moroccan Soap with Argan Oil - Argan oil is known for its strong hydration.", descAr: "الصابون المغربي بزيت الأرجان - زيت الأرجان معروف بترطيبه القوي."},
    {id: 9, nameEn: "Lip Gloss", nameAr: "ليب جلوس", price: 100, image: "WhatsApp Image 2026-03-03 at 11.34.44 PM.jpeg", descEn: "Lip Gloss - A therapeutic lip gloss rich with vitamin E.", descAr: "ليب جلوس تنافس أجمد براند 🤏💗"},
    {id: 10, nameEn: "Foot Care Set (Sock + File)", nameAr: "مجموعة العناية بالقدمين", price: 180, image: "WhatsApp Image 2026-03-03 at 11.36.34 PM.jpeg", descEn: "Foot Care Set - Silicon Gel Sock with Vitamin E + VIP Foot File.", descAr: "مجموعة العناية بالقدمين - شراب سيلكون چيل بفيتامبن E + مبرد القدمين."}

    ];
    
    function getProductName(product) {
        var lang = localStorage.getItem("lang") || "en";
        return lang === "ar" ? product.nameAr : product.nameEn;
    }
    
    function getProductDesc(product) {
        var lang = localStorage.getItem("lang") || "en";
        return lang === "ar" ? product.descAr : product.descEn;
    }
    
    function renderProduct() {
        var url = new URLSearchParams(window.location.search);
        var proid = parseInt(url.get("id"));
        var prodact = prodacts.find(function(p) { return p.id === proid; });
        
        var cont = document.getElementById("prodactdetalis");
        var btnText = localStorage.getItem("lang") === "ar" ? "أضف للسلة" : "Add to Cart";
        var cartText = localStorage.getItem("lang") === "ar" ? "سلتك" : "YOUR CART";
        var checkoutText = localStorage.getItem("lang") === "ar" ? "الدفع" : "check out";
        
        cont.innerHTML = "<img src='" + prodact.image + "'><div class='info'><h3>" + getProductName(prodact) + "</h3><div class='desc'>" + getProductDesc(prodact).replace(/\n/g, '<br>') + "</div><div class='price'>" + prodact.price + " LE</div><button class='btn' onclick='addToCart(" + prodact.id + ")'>" + btnText + "</button></div>";
        
        var cartHeader = document.querySelector(".cart_header");
        if (cartHeader) { cartHeader.innerHTML = cartText + ' <span class="close-cart" onclick="closecart()">x</span>'; }
        
        var checkoutBtn = document.querySelector(".checkout-btn");
        if (checkoutBtn) { checkoutBtn.textContent = checkoutText; }
    }
    
    function getcart() {
        var data = localStorage.getItem("cart");
        if (!data) return [];
        var parse = JSON.parse(data);
        if (!Array.isArray(parse)) { localStorage.removeItem("cart"); return []; }
        return parse;
    }

    function savecart(cart) { localStorage.setItem("cart", JSON.stringify(cart)); }

    function addToCart(id) {
        var p = prodacts.find(function(prod) { return prod.id === id; });
        var cart = getcart();
        var existingItem = cart.find(function(item) { return item.id === id; });
        
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({id: p.id, name: getProductName(p), price: p.price, quantity: 1});
        }
        
        savecart(cart);
        updateCart();
        openCart();
    }
    
    function updateCart() {
        var list = document.getElementById("cartItems");
        list.innerHTML = "";
        var cart = getcart();

        cart.forEach(function(item, index) {
            list.innerHTML += "<div class='item'><span>" + getProductName(item) + "</span><div class='qty-controls'><button onclick='changeQty(" + index + ", -1)'>➖</button><span>" + item.quantity + "</span><button onclick='changeQty(" + index + ", 1)'>➕</button></div><span>" + (item.price * item.quantity) + " LE</span><button class='delete-btn' onclick='removeItem(" + index + ")'>🗑️</button></div><hr>";
        });
    }
    
    function changeQty(index, change) {
        var cart = getcart();
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
        savecart(cart);
        updateCart();
    }
    
    function removeItem(index) {
        var cart = getcart();
        cart.splice(index, 1);
        savecart(cart);
        updateCart();
    }
    function openCart() { document.getElementById("cart").classList.add("open"); }
    function closecart() { document.getElementById("cart").classList.remove("open"); }
    function toggleMenu() { document.getElementById("navMenu").classList.toggle("active"); }
    
    document.addEventListener("DOMContentLoaded", function() {
        var savedLang = localStorage.getItem("lang");
        if (savedLang) {
            document.body.dir = savedLang === "ar" ? "rtl" : "ltr";
            document.getElementById("langBtn").textContent = savedLang === "en" ? "العربية" : "English";
        }
        renderProduct();
        updateCart();
        updateContent();
    });
    </script>
