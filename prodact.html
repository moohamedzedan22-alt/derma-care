<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Derma Care</title>
    <link rel="stylesheet" href="derma.css">
    <style>
        /* Admin icon in navbar */
        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: white;
            font-size: 17px;
            transition: 0.3s;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .admin-nav-link:hover { color: #ffe0ec; background: rgba(255,255,255,0.3); }
        .admin-icon { font-size: 18px; }
    </style>
</head>
<body>
     <nav>
    <div class="logo">Derma Care</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul id="navMenu">
        <li class="close-btn" onclick="toggleMenu()">✖</li>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About As</a></li>
        <li><a href="#">Prodacts</a></li>
        <li><a href="contant.html">Contact</a></li>
        <li>
            <a href="admin.html" class="admin-nav-link" id="adminNavLink" title="Admin">
                <span class="admin-icon">👤</span> Login
            </a>
        </li>
    </ul>
    </nav>
    
    <!-- Shared data store -->
    <script src="products.js"></script>

    <script>
    document.write('<button id="langBtn" onclick="toggleLang()" style="position:fixed;top:80px;right:20px;z-index:1001;padding:10px 20px;background:white;border:2px solid rgb(235, 65, 121);border-radius:20px;cursor:pointer;font-weight:bold;color:rgb(235, 65, 121)">العربية</button>');

    function toggleLang() {
        var lang = localStorage.getItem("lang") || "en";
        var newLang = lang === "en" ? "ar" : "en";
        localStorage.setItem("lang", newLang);
        document.body.dir = newLang === "ar" ? "rtl" : "ltr";
        document.getElementById("langBtn").textContent = newLang === "en" ? "العربية" : "English";
        renderProducts();
        updateContent();
        updateAdminIcon();
    }
    
    function updateContent() {
        var lang = localStorage.getItem("lang") || "en";
        var navLinks = document.querySelectorAll("#navMenu li a:not(.admin-nav-link)");
        if (navLinks[0]) navLinks[0].textContent = lang === "ar" ? "الرئيسية" : "Home";
        if (navLinks[1]) navLinks[1].textContent = lang === "ar" ? "عن الشركة" : "About As";
        if (navLinks[2]) navLinks[2].textContent = lang === "ar" ? "المنتجات" : "Prodacts";
        if (navLinks[3]) navLinks[3].textContent = lang === "ar" ? "اتصل بنا" : "Contact";
        
        var footerText = document.getElementById("footerText");
        if (footerText) footerText.textContent = lang === "ar" ? "جميع الحقوق محفوظة" : "All Rights Reserved";
    }
    </script>

    <div class="prodact" id="contaner"></div>

    <footer>
     <p>01030006247</p>
     <p>Derma Care</p>
     <p id="footerText">All Rights Reserved</p>
    </footer>

    <script>
    function getProductName(product) {
        var lang = localStorage.getItem("lang") || "en";
        return lang === "ar" ? product.nameAr : product.nameEn;
    }
    
    function renderProducts() {
        // Always load fresh from localStorage
        var prodacts = DC_getProducts();

        var container = document.getElementById("contaner");
        container.innerHTML = "";
        var btnText = localStorage.getItem("lang") === "ar" ? "عرض المنتج" : "view product";
        
        prodacts.forEach(function(prodact) {
            container.innerHTML += "<div class='car'><img class='image' src='" + prodact.image + "' onclick='goToprodact(" + prodact.id + ")'><h3 onclick='goToprodact(" + prodact.id + ")'>" + getProductName(prodact) + "</h3><div class='pric'>" + prodact.price + " LE</div><button class='bt' onclick='goToprodact(" + prodact.id + ")'>" + btnText + "</button></div>";
        });
    }
    
    function goToprodact(id) {
        window.location.href = "image.html?id=" + id;
    }
    
    function toggleMenu() {
        document.getElementById("navMenu").classList.toggle("active");
    }

    function updateAdminIcon() {
        var adminLink = document.getElementById("adminNavLink");
        var lang = localStorage.getItem("lang") || "en";
        if (adminLink) {
            if (DC_isAdminLoggedIn()) {
                adminLink.innerHTML = '<span class="admin-icon">⚙️</span> ' + (lang === "ar" ? "لوحة التحكم" : "Admin");
            } else {
                adminLink.innerHTML = '<span class="admin-icon">👤</span> ' + (lang === "ar" ? "تسجيل الدخول" : "Login");
            }
        }
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        var savedLang = localStorage.getItem("lang");
        if (savedLang) {
            document.body.dir = savedLang === "ar" ? "rtl" : "ltr";
            document.getElementById("langBtn").textContent = savedLang === "en" ? "العربية" : "English";
        }
        renderProducts();
        updateContent();
        updateAdminIcon();
    });
    </script>
</body>
</html>
