    <script>
    document.write('<button id="langBtn" onclick="toggleLang()" style="position:fixed;top:80px;right:20px;z-index:1001;padding:10px 20px;background:white;border:2px solid rgb(235, 65, 121);border-radius:20px;cursor:pointer;font-weight:bold;color:rgb(235, 65, 121)">العربية</button>');

    function toggleLang() {
        var lang = localStorage.getItem("lang") || "en";
        var newLang = lang === "en" ? "ar" : "en";
        localStorage.setItem("lang", newLang);
        document.body.dir = newLang === "ar" ? "rtl" : "ltr";
        document.getElementById("langBtn").textContent = newLang === "en" ? "العربية" : "English";
        renderProducts();
        updateContent();
    }
    
    function updateContent() {
        var lang = localStorage.getItem("lang") || "en";
        var navLinks = document.querySelectorAll("#navMenu li a");
        if (navLinks[0]) navLinks[0].textContent = lang === "ar" ? "الرئيسية" : "Home";
        if (navLinks[1]) navLinks[1].textContent = lang === "ar" ? "عن الشركة" : "About As";
        if (navLinks[2]) navLinks[2].textContent = lang === "ar" ? "المنتجات" : "Prodacts";
        if (navLinks[3]) navLinks[3].textContent = lang === "ar" ? "اتصل بنا" : "Contact";
        
        var footerText = document.getElementById("footerText");
        if (footerText) footerText.textContent = lang === "ar" ? "جميع الحقوق محفوظة" : "All Rights Reserved";
    }
    </script>

    function getProductName(product) {
        var lang = localStorage.getItem("lang") || "en";
        return lang === "ar" ? product.nameAr : product.nameEn;
    }
    
    function renderProducts() {
        var container = document.getElementById("contaner");
        container.innerHTML = "";
        var btnText = localStorage.getItem("lang") === "ar" ? "عرض المنتج" : "view product";
        
        prodacts.forEach(function(prodact) {
            container.innerHTML += "<div class='car'><img class='image' src='" + prodact.image + "' onclick='goToprodact(" + prodact.id + ")'><h3 onclick='goToprodact(" + prodact.id + ")'>" + getProductName(prodact) + "</h3><div class='pric'>" + prodact.price + " LE</div><button class='bt' onclick='goToprodact(" + prodact.id + ")'>" + btnText + "</button></div>";
        });
    }
    
    function goToprodact(id) {
        window.location.href = "image.html?id=" + id;
    }
    
    function toggleMenu() {
        document.getElementById("navMenu").classList.toggle("active");
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        var savedLang = localStorage.getItem("lang");
        if (savedLang) {
            document.body.dir = savedLang === "ar" ? "rtl" : "ltr";
            document.getElementById("langBtn").textContent = savedLang === "en" ? "العربية" : "English";
        }
        renderProducts();
        updateContent();
    });
    </script>
